name: Keep Deployments Alive

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Deployment Dashboard
        run: |
          wget \
            --tries=5 \
            --timeout=30 \
            https://keepalive.streamlit.app/
